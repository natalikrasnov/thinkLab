<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="#1A1A2E" />
  
  <g stroke="url(#grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- Abstract Brain / Nodes -->
    <path d="M 50,20 C 30,20 20,40 20,55 C 20,70 35,80 50,80 C 65,80 80,70 80,55 C 80,40 70,20 50,20 Z" />
    <circle cx="50" cy="50" r="8" fill="url(#grad)" />
    <line x1="50" y1="50" x2="30" y2="35" />
    <circle cx="30" cy="35" r="4" fill="url(#grad)" />
    <line x1="50" y1="50" x2="70" y2="35" />
    <circle cx="70" cy="35" r="4" fill="url(#grad)" />
    <line x1="50" y1="50" x2="35" y2="65" />
    <circle cx="35" cy="65" r="4" fill="url(#grad)" />
    <line x1="50" y1="50" x2="65" y2="65" />
    <circle cx="65" cy="65" r="4" fill="url(#grad)" />
    
    <path d="M 30,35 Q 50,25 70,35" stroke-dasharray="4 4" />
    <path d="M 35,65 Q 50,75 65,65" stroke-dasharray="4 4" />
  </g>
</svg>
